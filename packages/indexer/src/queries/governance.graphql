fragment ProposalBaseFields on Proposal {
  id
  chainId
  proposalAddress
  scope
  dacId
  dealId
  proposalNumericId
  kindSelector
  kindName
  targetAddress
  data1
  data2
  tokenAddress
  totalVotingPower
  quorum
  blockingQuorum
  snapshotReference
  snapshotReferenceKind
  snapshotTime
  endTime
  proposalVariant
  voteCount
  merkleVoteCount
  yesVotes
  noVotes
  resolved
  passed
  executed
  executionValidityDuration
  resolutionTime
  executionDeadline
  executionExpired
  currentPhase
  phaseStartTime
  phaseEndTime
  currentPhaseSnapshotBlock
  createdBlockNumber
  createdBlockTimestamp
  createdTransactionHash
  resolvedBlockNumber
  executedBlockNumber
}

fragment ProposalPhaseEventViewFields on ProposalPhaseEvent {
  id
  chainId
  dacProposalId
  proposalNumericId
  phase
  snapshotBlock
  startTime
  endTime
  totalVotingPower
  quorum
  blockingQuorum
  createdBlockNumber
  createdBlockTimestamp
  createdTransactionHash
}

fragment OracleSnapshotViewFields on OracleSnapshot {
  id
  chainId
  dacId
  dacProposalId
  proposalNumericId
  governanceOracleId
  snapshotBlock
  merkleRoot
  totalUnderlyingVotingPower
  publishedAt
  createdBlockNumber
  createdBlockTimestamp
  createdTransactionHash
}

fragment MerkleVoteViewFields on MerkleVote {
  id
  chainId
  dacProposalId
  dacId
  accountId
  voter
  support
  weight
  merkleIndex
  createdBlockNumber
  createdBlockTimestamp
  createdTransactionHash
}

fragment DealProposalChallengeViewFields on DealProposalChallenge {
  id
  chainId
  dealId
  dealProposalId
  dacProposalId
  proposalNumericId
  createdBlockNumber
  createdBlockTimestamp
  createdTransactionHash
}

fragment DacProposalViewFields on DacProposal {
  id
  chainId
  proposalId
  dacId
  governanceType
  createdBlockNumber
  proposal {
    ...ProposalBaseFields
  }
  phaseEvents(order_by: [{createdBlockNumber: asc}]) {
    ...ProposalPhaseEventViewFields
  }
  oracleSnapshots(order_by: [{createdBlockNumber: asc}]) {
    ...OracleSnapshotViewFields
  }
  merkleVotes(order_by: [{createdBlockNumber: asc}]) {
    ...MerkleVoteViewFields
  }
  challengedDeals(order_by: [{createdBlockNumber: asc}]) {
    ...DealProposalChallengeViewFields
  }
}

fragment DealProposalViewFields on DealProposal {
  id
  chainId
  proposalId
  dacId
  dealId
  challengeable
  challenged
  challengeCount
  createdBlockNumber
  proposal {
    ...ProposalBaseFields
  }
  challenges(order_by: [{createdBlockNumber: asc}]) {
    ...DealProposalChallengeViewFields
  }
}

query GetProposalById($id: String!) {
  Proposal(where: {id: {_eq: $id}}, limit: 1) {
    ...ProposalBaseFields
  }
}

query GetProposalByAddress($proposalAddress: String!) {
  Proposal(where: {proposalAddress: {_eq: $proposalAddress}}, limit: 1) {
    ...ProposalBaseFields
  }
}

query GetProposalByDacAndNumericId($dacId: String!, $proposalNumericId: numeric!) {
  Proposal(
    where: {dacId: {_eq: $dacId}, proposalNumericId: {_eq: $proposalNumericId}}
    limit: 1
  ) {
    ...ProposalBaseFields
  }
}

query GetProposalByDealAndNumericId($dealId: String!, $proposalNumericId: numeric!) {
  Proposal(
    where: {dealId: {_eq: $dealId}, proposalNumericId: {_eq: $proposalNumericId}}
    limit: 1
  ) {
    ...ProposalBaseFields
  }
}

query GetDacProposalByProposalId($proposalId: String!) {
  DacProposal(where: {proposalId: {_eq: $proposalId}}, limit: 1) {
    ...DacProposalViewFields
  }
}

query GetDealProposalByProposalId($proposalId: String!) {
  DealProposal(where: {proposalId: {_eq: $proposalId}}, limit: 1) {
    ...DealProposalViewFields
  }
}

query ListProposalsByDac($dacId: String!, $limit: Int!, $offset: Int!) {
  Proposal(
    where: {dacId: {_eq: $dacId}}
    limit: $limit
    offset: $offset
    order_by: [{proposalNumericId: desc}, {createdBlockNumber: desc}]
  ) {
    ...ProposalBaseFields
  }
}

query ListProposalsByDeal($dealId: String!, $limit: Int!, $offset: Int!) {
  Proposal(
    where: {dealId: {_eq: $dealId}}
    limit: $limit
    offset: $offset
    order_by: [{proposalNumericId: desc}, {createdBlockNumber: desc}]
  ) {
    ...ProposalBaseFields
  }
}

query ListDacProposalsByDac($dacId: String!, $limit: Int!, $offset: Int!) {
  DacProposal(
    where: {dacId: {_eq: $dacId}}
    limit: $limit
    offset: $offset
    order_by: [{createdBlockNumber: desc}]
  ) {
    ...DacProposalViewFields
  }
}

query ListDealProposalsByDeal($dealId: String!, $limit: Int!, $offset: Int!) {
  DealProposal(
    where: {dealId: {_eq: $dealId}}
    limit: $limit
    offset: $offset
    order_by: [{createdBlockNumber: desc}]
  ) {
    ...DealProposalViewFields
  }
}
